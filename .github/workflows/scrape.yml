name: BEU 2022 Auto Scraper Relay

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: beu-auto-scraper
  cancel-in-progress: false

jobs:
  scrape-data:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Ensure base files exist
        shell: pwsh
        run: |
          if (!(Test-Path "state.json")) { '{"lineIndex":0,"rollIndex":1}' | Out-File -Encoding utf8 state.json }
          if (!(Test-Path "seen.txt")) { New-Item -ItemType File seen.txt | Out-Null }
          if (!(Test-Path "failed_regnos.txt")) { New-Item -ItemType File failed_regnos.txt | Out-Null }
          if (!(Test-Path "result_students.txt")) { "reg_no | back_codes | back_names" | Out-File -Encoding utf8 result_students.txt }
          if (!(Test-Path "run.log")) { New-Item -ItemType File run.log | Out-Null }

      - name: Run scraper
        id: scrape
        continue-on-error: true
        shell: pwsh
        run: |
          node scraper.js

      - name: Commit and push progress
        if: always()
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add state.json seen.txt failed_regnos.txt result_students.txt run.log

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }

          git commit -m "Auto-update: scraper progress"
          git push

      - name: Fail workflow if scraper failed
        if: steps.scrape.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Error "Scraper step failed. Progress was still committed."
